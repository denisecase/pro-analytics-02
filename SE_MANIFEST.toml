# ============================================================
# SE_MANIFEST.toml (Repository Declaration)
# ============================================================

schema = "se-manifest-schema"
schema_version = "0.5.0"
schema_url = "https://raw.githubusercontent.com/structural-explainability/se-manifest-schema/main/manifest-schema.toml"

# === Framework Context ===

[meta]
framework = "Structural Explainability"
framework_url = "https://github.com/structural-explainability"
purpose = "Declares this repository's role in the Structural Explainability ecosystem."

# === Repository Identity ===

[repository]
organization = "structural-explainability"
name = "pro-analytics-02"
class = "docs"
kind  = "educational"
status = "active"
since = "2026"
summary = "Reference guide for modern professional Python project structure, tooling, and workflow."

# === Layer Position ===

[layer]
space = "Data Analytics"
role = "post-secondary-education"

# === Dependency Declarations ===

[depends]
required = ["git", "node", "python>=3.14", "uv"]
optional = [
    "lychee",
    "pre-commit",
    "pyright",
    "pytest",
    "ruff",
    "se-codeowners",
    "se-manifest-schema",
    "zensical",
      { repository = "se-manifest-schema", kind = "tooling", version = "v0.4.1" },

]

# === Provided Artifacts ===


[provides]
artifacts = [
    ".accountability/surfaces.toml",
    ".github/CODEOWNERS",
    "AGENTS.md",
    "ANNOTATIONS.md",
    "CHANGELOG.md",
    "CITATION.cff",
    "LICENSE",
    "README.md",
    "SE_MANIFEST.toml",
    "SECURITY.md",
    "pyproject.toml",
]

# === Scope ===

[scope]
includes = [
    "professional Python project structure (src layout, hatchling build)",
    "tooling configuration (ruff, pyright strict, pre-commit, uv)",
    "CI/CD integration via GitHub Actions",
    "documentation site via zensical",
    "reference workflows for Python development",
    "AI-use guidance and agentic capability awareness",
    "accountable surface declarations for shared resources",
]
excludes = [
    "domain analytics content (e.g., EDA, ML, SQL)",
    "dataset-specific logic or ingestion pipelines",
    "personally identifying information (PII)",
    "production deployment configuration",
]

# === Validation ===

[validation]
entrypoint = "uvx se-manifest-schema validate-manifest --path SE_MANIFEST.toml"
strict_entrypoint = "uvx se-manifest-schema validate-manifest --path SE_MANIFEST.toml --strict"

# === External references ===

[citation]
cff = "CITATION.cff"
preferred = "software"

[traceability]
identifier_map = "none"
